<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnBasilan — Design Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral: #FF7E5F; --coral-dark: #E86548; --coral-light: #FFA68F; --coral-glow: #FFF0EB;
      --teal: #2EC4B6; --teal-dark: #219A8F; --teal-light: #7DDAD0; --teal-glow: #E8F8F6;
      --gold: #FFD93D; --gold-light: #FFE680; --gold-glow: #FFF8E0;
      --green: #6BCB77; --green-light: #94D99D; --green-glow: #EDF8EF;
      --ocean: #1A535C; --ocean-light: #2D7A87;
      --cream: #FFF8F0; --cream-dark: #F5E6D5; --sand: #FDF6ED;
      --white: #FFFFFF; --slate: #4A5568; --slate-light: #718096;
      --bg: var(--cream); --bg-card: var(--white); --bg-input: #FEFCF9;
      --text: var(--ocean); --text-muted: var(--slate); --text-light: var(--slate-light);
      --border: #E8DDD0; --shadow-sm: 0 2px 8px rgba(26, 83, 92, 0.08);
      --shadow-md: 0 4px 20px rgba(26, 83, 92, 0.12); --shadow-lg: 0 8px 40px rgba(26, 83, 92, 0.16);
      --shadow-coral: 0 4px 20px rgba(255, 126, 95, 0.35);
      --radius-sm: 12px; --radius-md: 18px; --radius-lg: 24px; --radius-xl: 32px; --radius-full: 9999px;
      --font-display: 'Fredoka', sans-serif; --font-body: 'Nunito', sans-serif;
      --app-width: 390px; --app-height: 844px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: var(--font-body);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    .phone-frame {
      width: var(--app-width); height: var(--app-height);
      background: var(--bg); border-radius: 48px;
      overflow: hidden; position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      border: 8px solid #0D3B42;
    }
    .phone-notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 160px; height: 34px; background: #0D3B42;
      border-radius: 0 0 20px 20px; z-index: 100;
    }
    .app-screen { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; position: relative; }
    .app-screen::-webkit-scrollbar { display: none; }
    .screen { display: none; width: 100%; min-height: 100%; padding: 60px 20px 80px; flex-direction: column; animation: screenIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .screen.active { display: flex; }
    @keyframes screenIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* SPLASH */
    #splash { padding: 0; background: linear-gradient(180deg, #1A535C 0%, #0D3B42 100%); justify-content: center; align-items: center; }
    .splash-logo { width: 100px; height: 100px; background: var(--coral); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 40px; color: white; font-weight: 700; box-shadow: var(--shadow-coral); }
    .splash-title { font-family: var(--font-display); font-size: 32px; color: white; margin-top: 20px; }
    .splash-title span { color: var(--gold); }

    /* UTILS */
    .btn { padding: 16px; border-radius: 30px; border: none; font-family: var(--font-display); font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
    .btn-primary { background: var(--coral); color: white; }
    .lang-card { padding: 16px; background: white; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; border: 2px solid transparent; box-shadow: var(--shadow-sm); cursor: pointer; }
    .lang-card.selected { border-color: var(--coral); background: var(--coral-glow); }

    /* HOME */
    .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .xp-card { background: var(--gold-glow); padding: 16px; border-radius: 20px; margin-bottom: 20px; }
    .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .subject-card { background: white; padding: 16px; border-radius: 18px; box-shadow: var(--shadow-sm); }
    .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 8px; }

    /* SUBJECT */
    .hero { background: var(--coral); padding: 80px 20px 30px; margin: -60px -20px 20px; border-radius: 0 0 30px 30px; color: white; }
    .chapter-item { background: white; padding: 16px; border-radius: 15px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; box-shadow: var(--shadow-sm); }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="app-screen" id="app">
      <!-- Splash -->
      <div class="screen active" id="splash">
        <div class="splash-logo">LB</div>
        <h1 class="splash-title">Learn<span>Basilan</span></h1>
      </div>
      <!-- Language -->
      <div class="screen" id="language">
        <h2 style="font-family:var(--font-display);margin-bottom:20px;">Pumili ng Wika</h2>
        <div class="lang-card selected" onclick="showScreen('home')"><span>🇵🇭</span> <div><b>Filipino</b><br><small>Tagalog</small></div></div>
        <div class="lang-card"><span>🏝️</span> <div><b>Yakan</b><br><small>Bissa Yakan</small></div></div>
        <button class="btn btn-primary" onclick="showScreen('home')">Magpatuloy</button>
      </div>
      <!-- Home -->
      <div class="screen" id="home">
        <div class="home-header">
          <div><h3 style="font-family:var(--font-display)">Hello, Juan! 👋</h3><p style="font-size:12px;color:var(--slate)">Grade 2</p></div>
          <div style="width:40px;height:40px;background:var(--coral-light);border-radius:20px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700">J</div>
        </div>
        <div class="xp-card"><b>Level 4</b><div style="height:8px;background:white;border-radius:4px;margin-top:8px;"><div style="width:68%;height:100%;background:var(--coral);border-radius:4px;"></div></div></div>
        <div class="subject-grid">
          <div class="subject-card" onclick="showScreen('subject')"><div class="icon-box" style="background:#FFE8E0">🔢</div><b>Math</b></div>
          <div class="subject-card"><div class="icon-box" style="background:#E0F5F3">🔬</div><b>Science</b></div>
        </div>
      </div>
      <!-- Subject -->
      <div class="screen" id="subject">
        <div class="hero"><button onclick="showScreen('home')" style="background:none;border:none;color:white;margin-bottom:10px;cursor:pointer;">← Back</button><h1>Mathematics</h1></div>
        <div class="chapter-item"><span>✅</span> <div><b>Pagbilang 1-100</b><br><small>Completed</small></div></div>
        <div class="chapter-item" style="border:2px solid var(--coral-light)"><span>📖</span> <div><b>Addition</b><br><small>In Progress</small></div></div>
      </div>
    </div>
  </div>
  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    setTimeout(() => showScreen('language'), 2000);
  </script>
</body>
</html>
