name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK (local EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build APK (local)
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output ./LearnBasilan.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: List build output
        if: always()
        run: |
          echo "--- Searching for APK files ---"
          find . -name "*.apk" -type f 2>/dev/null || true
          echo "--- Searching for AAB files ---"
          find . -name "*.aab" -type f 2>/dev/null || true
          echo "--- Build directory contents ---"
          ls -la build/ 2>/dev/null || echo "No build/ directory"
          ls -la . 2>/dev/null | head -30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: LearnBasilan-APK
          path: |
            ./*.apk
            **/*.apk
          retention-days: 30
          if-no-files-found: warn
