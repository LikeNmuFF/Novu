name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find APK
        id: find-apk
        if: always()
        run: |
          APK=$(find android/app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          if [ -n "$APK" ]; then
            echo "Found APK: $APK"
            cp "$APK" ./LearnBasilan.apk
          else
            echo "No APK found. Listing build outputs:"
            find android/ -name "*.apk" -o -name "*.aab" 2>/dev/null || true
            echo "--- gradle tasks ---"
            cd android && ./gradlew tasks --all 2>/dev/null | grep -i assemble || true
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: steps.find-apk.outputs.apk_path != ''
        with:
          name: LearnBasilan-APK
          path: ./LearnBasilan.apk
          retention-days: 30
